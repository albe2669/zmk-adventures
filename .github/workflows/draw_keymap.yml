name: Draw keymap

on:
  push:
    branches:
      - master
    paths:
      - 'config/**.keymap'

permissions:
  contents: write

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install keymap-drawer
        run: pip install "keymap-drawer==0.20.0"

      - name: Generate keymap SVG
        run: |
          keymap parse -z config/splitkb_aurora_corne.keymap > /tmp/keymap.yaml
          keymap draw /tmp/keymap.yaml \
            --ortho-layout '{split: true, rows: 3, columns: 6, thumbs: 3}' \
            > images/keymap.svg

      - name: Commit updated images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/keymap.svg
          git diff --staged --quiet || \
            git commit -m "chore: regenerate keymap images [skip ci]" && \
            git push origin HEAD:master
